<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>ridict 設定</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 640px;
        margin: 24px auto;
        padding: 0 16px;
        line-height: 1.6;
      }
      label {
        display: block;
        margin: 0 0 4px;
        font-weight: 600;
        font-size: 13px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        font-size: 14px;
      }
      .hint {
        color: #666;
        font-size: 12px;
        margin-top: 8px;
      }
      .dict {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px 16px;
        margin-top: 16px;
      }
      .dict-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .dict-header h2 {
        font-size: 14px;
        margin: 0;
        margin-right: auto;
      }
      .enabled-label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin: 0 12px 0 0;
        font-weight: normal;
        font-size: 13px;
        cursor: pointer;
      }
      .enabled-label input {
        width: auto;
      }
      .dict-row {
        display: grid;
        grid-template-columns: 1fr 2fr 1fr;
        gap: 12px;
      }
      button {
        padding: 8px 20px;
        font-size: 14px;
        cursor: pointer;
      }
      .remove {
        padding: 2px 10px;
        font-size: 12px;
      }
      #add {
        margin-top: 16px;
      }
      #save {
        margin-top: 20px;
      }
      #status {
        color: #1a7f37;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <h1>ridict 設定</h1>

    <p class="hint">
      辞書は最大 5 件まで登録できます。「メニューに表示」が 2 件以上 ON
      だと、右クリックメニューに辞書名の一覧が表示されます。<br />
      OFF にするとメニューから消えますが、設定は保持されます（全部 OFF
      にするとメニュー自体が出ません）。<br />
      検索 URL は「ベース URL?パラメータ名=単語」の形で開きます（例:
      https://eow.alc.co.jp/search?q=apple）。
    </p>

    <div id="dicts"></div>

    <button id="add" type="button">＋ 辞書を追加</button>

    <template id="dict-template">
      <div class="dict">
        <div class="dict-header">
          <h2></h2>
          <label class="enabled-label"><input class="enabled" type="checkbox" /> メニューに表示</label>
          <button class="remove" type="button">削除</button>
        </div>
        <div class="dict-row">
          <div>
            <label>表示名</label>
            <input class="name" type="text" placeholder="英辞郎" />
          </div>
          <div>
            <label>検索サイトの URL</label>
            <input class="baseUrl" type="url" placeholder="https://eow.alc.co.jp/search" />
          </div>
          <div>
            <label>パラメータ名</label>
            <input class="paramName" type="text" placeholder="q" />
          </div>
        </div>
      </div>
    </template>

    <div>
      <button id="save">保存</button>
    </div>
    <p id="status"></p>

    <script src="options.js"></script>
  </body>
</html>
